<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IQ Test Professional</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#0F172A;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

background:white;

width:380px;

padding:35px;

border-radius:20px;

box-shadow:0px 15px 40px rgba(0,0,0,.3);

}

.logo{

text-align:center;

font-size:32px;

font-weight:bold;

color:#2563EB;

}

.sub{

text-align:center;

margin-top:10px;

margin-bottom:30px;

color:gray;

}

label{

font-size:14px;

font-weight:bold;

}

input{

width:100%;

padding:13px;

margin-top:8px;

margin-bottom:20px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:#2563EB;

color:white;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#1D4ED8;

}

.footer{

text-align:center;

margin-top:25px;

font-size:14px;

}

.footer a{

text-decoration:none;

color:#2563EB;

font-weight:bold;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

IQ TEST

</div>

<div class="sub">

Professional Version

</div>

<label>Email</label>

<input
id="email"
type="email"
placeholder="Masukkan Email">

<label>Password</label>

<input
id="password"
type="password"
placeholder="Masukkan Password">

<button onclick="login()">

LOGIN

</button>

<div class="footer">

Belum punya akun?

<a href="#">

Daftar

</a>

</div>

</div>
  
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/login.js"></script>
  
</body>

</html>
